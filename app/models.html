<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Settings — Virtual Office</title>
<script>
let modelSettingsOfficeName = 'Virtual Office';
function updateModelSettingsTitle() {
  const title = typeof i18n !== 'undefined' ? i18n.t('model_settings_title') : 'Model Settings';
  document.title = title + ' — ' + modelSettingsOfficeName;
}
fetch('/vo-config').then(r=>r.json()).then(d=>{
  if (d.office&&d.office.name) modelSettingsOfficeName=d.office.name;
  updateModelSettingsTitle();
}).catch(updateModelSettingsTitle);
window.addEventListener('i18n:ready', updateModelSettingsTitle);
window.addEventListener('i18n:changed', updateModelSettingsTitle);
</script>
    <!-- i18n: inline locale data for immediate init -->
    <script id="locale-en" type="application/json">{}</script>
    <script id="locale-zh" type="application/json">{}</script>
    <script src="i18n.js"></script>
    <script>
    (function(){
        var lang='en';
        try{var s=localStorage.getItem('vo-i18n-lang');if(s==='zh')lang='zh';else if(navigator.language&&navigator.language.toLowerCase().indexOf('zh')>=0)lang='zh';}catch(e){}
        var eE=document.getElementById('locale-en'),eZ=document.getElementById('locale-zh');
        function load(l,el){fetch('locales/'+l+'.json').then(function(r){return r.json()}).then(function(d){el.textContent=JSON.stringify(d)}).catch(function(){});}
        load('en',eE);load('zh',eZ);
    })();
    </script>

    <style>
        :root { --bg:#0d0d1a; --surface:#141428; --border:#2a2a4a; --gold:#ffd700; --text:#d8d8e8; --text-dim:#8f91aa; --green:#4caf50; --red:#f44336; --blue:#2196f3; --purple:#8b5cf6; }

        h2 { font-size:9px; color:var(--gold); margin:14px 0 8px; }
        h3 { font-size:8px; color:var(--gold); margin:10px 0 6px; }
        p { margin:5px 0; }
        .back-btn { display:inline-block; padding:6px 12px; background:var(--surface); color:var(--gold); border:1px solid var(--border); border-radius:4px; cursor:pointer; font-family:inherit; font-size:7px; margin-bottom:10px; text-decoration:none; }
        .tabs { display:flex; gap:4px; margin-bottom:12px; flex-wrap:wrap; }
        .tab { padding:6px 10px; background:var(--surface); border:1px solid var(--border); border-radius:4px 4px 0 0; cursor:pointer; font-family:inherit; font-size:7px; color:var(--text-dim); }
        .tab.active { background:var(--border); color:var(--gold); }
        .panel { display:none; }
        .panel.active { display:block; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:10px; margin-bottom:10px; }
        .provider-header { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; }

        .provider-name { font-size:9px; color:var(--gold); overflow-wrap:anywhere; }
        .provider-current { color:var(--text-dim); text-align:right; max-width:46%; overflow-wrap:anywhere; word-break:break-word; }
        .muted { color:var(--text-dim); }
        .ok { color:var(--green); }

        .tag { display:inline-block; padding:2px 5px; border:1px solid var(--border); border-radius:3px; margin:2px; color:var(--text-dim); }
        input, select, textarea { font-family:'Press Start 2P', monospace; font-size:7px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:3px; padding:5px 6px; width:100%; }

        .btn { padding:5px 10px; font-family:inherit; font-size:7px; border:none; border-radius:3px; cursor:pointer; white-space:nowrap; margin:2px 2px 2px 0; }
        .btn-gold { background:var(--gold); color:#000; }
        .btn-green { background:var(--green); color:#fff; }
        .btn-red { background:var(--red); color:#fff; }
        .btn-blue { background:var(--blue); color:#fff; }
        .btn-purple { background:var(--purple); color:#fff; }

        .model-item { padding:4px 6px; font-size:7px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; gap:8px; align-items:center; }
        .model-item span { min-width:0; overflow-wrap:anywhere; word-break:break-word; }
        .model-item:last-child { border-bottom:none; }
        .status-msg { font-size:7px; margin:6px 0; min-height:12px; }

        .wide { grid-column:1 / -1; }
        .checkbox-row { display:flex; align-items:center; gap:6px; color:var(--text-dim); margin:6px 0; }

            .provider-header { flex-direction:column; }

        }

        textarea { min-height: 60px; resize: vertical; }

        .row label { min-width: 80px; color: var(--text-dim); flex-shrink: 0; }

        .btn {
            padding: 5px 10px; font-family: inherit; font-size: 7px;

        }
        .btn-gold { background: var(--gold); color: #000; }

        .btn-red { background: var(--red); color: #fff; }

        .btn-blue { background: var(--blue); color: #fff; }
        .btn-blue:hover { background: #42a5f5; }

        .model-list { max-height: 200px; overflow-y: auto; margin: 6px 0; }
        .model-item {
            padding: 3px 6px; font-size: 7px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .model-item:hover { background: rgba(255,255,255,0.03); }

        .ollama-params {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px; margin: 6px 0;

    </style>
</head>

    <a class="back-btn" href="/" data-i18n="back_to_office">← Back to Office</a>
    <h1 data-i18n="model_settings_title">⚙️ Model & Provider Settings</h1>

    <div class="tabs">
        <div class="tab active" onclick="showTab('cloud')" data-i18n="cloud_providers">☁️ Cloud Providers</div>
        <div class="tab" onclick="showTab('custom')" data-i18n="custom_providers">🔧 Custom Providers</div>

<script>
let nativeData = null;

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// --- Tabs ---
function showTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
}

// --- Load Data ---
async function loadProviders() {
    try {
        const res = await fetch('/config/providers');
        providersData = await res.json();
        renderCloudProviders();
        renderCustomProviders();
        renderOllama();
        renderLMStudio();
        renderNativeProviders();
    } catch(e) {
        document.getElementById('cloud-providers').innerHTML = '<p class="status-msg err">' + i18n.t('failed_to_load') + ': ' + e.message + '</p>';
    }
}

// --- Native Agent Runtimes ---
function renderNativeProviders() {
    const container = document.getElementById('native-providers');
    if (!container) return;
    const nativeProviders = providersData.nativeProviders || {};
    const hermes = nativeProviders.hermes || {};
    const codex = nativeProviders.codex || {};
    const claude = nativeProviders['claude-code'] || {};
    container.innerHTML = `<div class="native-grid">
        ${renderManagedAuthCard()}
        ${renderNativeSummaryCard('hermes', 'Hermes', hermes, renderHermesNativeForm(hermes))}
        ${renderNativeSummaryCard('codex', 'Codex CLI', codex, renderCodexNativeForm(codex))}
        ${renderNativeSummaryCard('claude-code', 'Claude Code', claude, renderClaudeNativeForm(claude))}
        ${renderNativeSetupGuide()}
    </div>`;
}

function renderManagedAuthCard() {
    const managed = providersData.managedAuth || {};
    const profiles = managed.managedStaticProfiles || [];
    const rows = managed.agentRows || [];
    return `<div class="card native-card wide"><div class="provider-header"><span class="provider-name">OpenClaw Global Auth</span><button class="btn btn-blue" onclick="syncOpenClawStaticAuth()">Sync Static Profiles</button></div>
      <div class="native-detail">Source <code>${escapeHtml(managed.sourceAgent || 'main')}</code> · ${profiles.length} managed static profiles</div>
      <div class="model-list">${rows.map(row => `<div class="model-item"><span>${escapeHtml(row.agent)} · ${row.staticInSync ? 'synced' : 'needs sync'}</span><span>${row.agent === 'main' || row.staticInSync ? '' : `<button class="btn btn-red" onclick="resetOpenClawAuthOverrides('${escapeHtml(row.agent)}')">Reset overrides</button>`}</span></div>`).join('')}</div>
      <p id="oc-managed-auth-status" class="status-msg"></p></div>`;
}

async function syncOpenClawStaticAuth() {
    const data = await postNativeJson('/api/native-models/openclaw/auth/sync-static', {});
    setNativeStatus('oc-managed-auth-status', data, data.ok ? 'Static profiles synchronized' : 'Sync failed');
    if (data.ok) setTimeout(loadProviders, 500);
}

async function resetOpenClawAuthOverrides(agentId) {
    const data = await postNativeJson('/api/native-models/openclaw/auth/reset-overrides', {agentId});
    setNativeStatus('oc-managed-auth-status', data, data.ok ? 'Overrides reset for ' + agentId : 'Reset failed');
    if (data.ok) setTimeout(loadProviders, 500);
}

function escAttr(value) {
    return String(value ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function nativeChecked(value, defaultValue) {
    return (value === undefined || value === null ? defaultValue : value) ? 'checked' : '';
}

function nativeStatusText(p) {
    if (p.detected === true) return ['has-key', i18n.t('native_status_available')];
    if (p.enabled === true) return ['no-key', i18n.t('native_status_configured_not_detected')];
    return ['', i18n.t('native_status_disabled')];
}

function renderNativeSummaryCard(id, label, p, bodyHtml) {
    const status = nativeStatusText(p || {});
    const detail = [];
    if (p.model) detail.push(i18n.t('native_model') + ': ' + p.model);
    if (p.workspace) detail.push(i18n.t('native_workspace') + ': ' + p.workspace);
    if (p.workspaceRoot) detail.push(i18n.t('native_workspace_root') + ': ' + p.workspaceRoot);
    if (p.mainWorkspace) detail.push(i18n.t('native_main_workspace') + ': ' + p.mainWorkspace);
    if (id === 'hermes' && p.apiEnabled) detail.push(i18n.t('native_api') + ': ' + (p.apiDetected ? i18n.t('native_status_available') : i18n.t('native_status_not_detected')));
    return `<div class="card native-card" id="native-provider-${id}">
        <div class="provider-header">
            <span class="provider-name">${label}</span>
            <span class="key-status ${status[0]}">${status[1]}</span>
        </div>
        <div class="native-detail">${detail.length ? detail.map(escapeHtml).join('<br>') : i18n.t('native_configure_runtime_here')}</div>
        ${bodyHtml}
    </div>`;
}

function renderHermesNativeForm(p) {
    return `<label class="checkbox-line"><input id="native-hermes-enabled" type="checkbox" ${nativeChecked(p.enabled, true)}> ${i18n.t('enable_hermes_agents')}</label>
        <label class="checkbox-line"><input id="native-hermes-api-enabled" type="checkbox" ${nativeChecked(p.apiEnabled || p.preferApi, false)}> ${i18n.t('use_hermes_native_api')}</label>
        <div class="row"><label>${i18n.t('native_home')}</label><input id="native-hermes-home" value="${escAttr(p.homePath || '')}" placeholder="~/.hermes"></div>
        <div class="row"><label>${i18n.t('native_cli')}</label><input id="native-hermes-bin" value="${escAttr(p.binary || '')}" placeholder="hermes or /path/to/hermes"></div>
        <div class="row"><label>${i18n.t('native_api_url')}</label><input id="native-hermes-api-url" value="${escAttr(p.apiUrl || '')}" placeholder="http://127.0.0.1:8642"></div>
        <div class="row"><label>${i18n.t('native_api_key')}</label><input id="native-hermes-api-key" type="password" autocomplete="off" placeholder="${escAttr(i18n.t('leave_blank_keep_key'))}"></div>
        <div class="row"><label>${i18n.t('hermes_desktop_url')}</label><input id="native-hermes-desktop-url" value="${escAttr(p.desktopUrl || '')}" placeholder="http://127.0.0.1:8643"></div>
        <div class="row"><label>${i18n.t('hermes_desktop_tcp_host')}</label><input id="native-hermes-desktop-host" value="${escAttr(p.desktopTcpHost || '')}" placeholder="host.docker.internal"></div>
        <div class="row"><label>${i18n.t('hermes_desktop_tcp_port')}</label><input id="native-hermes-desktop-port" value="${escAttr(p.desktopTcpPort || '')}" placeholder="8643"></div>
        <div class="row"><label>${i18n.t('hermes_desktop_host_header')}</label><input id="native-hermes-desktop-header" value="${escAttr(p.desktopHostHeader || '')}" placeholder="127.0.0.1:8643"></div>
        <label class="checkbox-line"><input id="native-hermes-platform-enabled" type="checkbox" ${nativeChecked(p.platformEnabled, false)}> ${i18n.t('hermes_gateway_platform')}</label>
        <div class="row"><label>${i18n.t('hermes_platform_token')}</label><input id="native-hermes-platform-token" type="password" autocomplete="off" placeholder="${escAttr(i18n.t('leave_blank_keep_key'))}"></div>
        <div class="row"><label>${i18n.t('hermes_platform_agent')}</label><input id="native-hermes-platform-agent" value="${escAttr(p.platformAgentId || 'hermes-gateway')}"></div>
        <div class="native-actions">
            <button class="btn btn-green" onclick="saveHermesNativeSetup()">${i18n.t('save')}</button>
            <button class="btn btn-blue" onclick="testHermesNativeSetup()">${i18n.t('test')}</button>
            <button class="btn btn-blue" onclick="discoverHermesNativeDesktop()">${i18n.t('hermes_discover_desktop')}</button>
        </div>
        <p id="native-hermes-status" class="status-msg"></p>`;
}

function renderCodexNativeForm(p) {
    const sandbox = p.sandbox || 'workspace-write';
    const approval = p.approvalPolicy || 'never';
    return `<label class="checkbox-line"><input id="native-codex-enabled" type="checkbox" ${nativeChecked(p.enabled, false)}> ${i18n.t('enable_codex_agents')}</label>
        <label class="checkbox-line"><input id="native-codex-include-main" type="checkbox" ${nativeChecked(p.includeMain, true)}> ${i18n.t('show_codex_main_agent')}</label>
        <label class="checkbox-line"><input id="native-codex-include-native" type="checkbox" ${nativeChecked(p.includeNativeAgents, true)}> ${i18n.t('discover_native_codex_agents')}</label>
        <label class="checkbox-line"><input id="native-codex-register-native" type="checkbox" ${nativeChecked(p.registerNativeAgents, true)}> ${i18n.t('register_new_standard_agents_in_native_codex')}</label>
        <label class="checkbox-line"><input id="native-codex-appserver" type="checkbox" ${nativeChecked(p.preferAppServer, true)}> ${i18n.t('prefer_app_server_protocol')}</label>
        <div class="row"><label>${i18n.t('native_home')}</label><input id="native-codex-home" value="${escAttr(p.homePath || '')}" placeholder="~/.codex"></div>
        <div class="row"><label>${i18n.t('native_cli')}</label><input id="native-codex-bin" value="${escAttr(p.binary || '')}" placeholder="codex"></div>
        <div class="row"><label>${i18n.t('native_workspace')}</label><input id="native-codex-workspace" value="${escAttr(p.workspace || '')}" placeholder="/workspace/project"></div>
        <div class="row"><label>${i18n.t('native_agent_root')}</label><input id="native-codex-workspace-root" value="${escAttr(p.workspaceRoot || '')}" placeholder="/data/codex-agents"></div>
        <div class="row"><label>${i18n.t('native_main')}</label><input id="native-codex-main-workspace" value="${escAttr(p.mainWorkspace || '')}" placeholder="/data/codex-main"></div>
        <div class="row"><label>${i18n.t('native_model')}</label><input id="native-codex-model" value="${escAttr(p.model || '')}" placeholder="${escAttr(i18n.t('optional'))}"></div>

function nativeValue(id) {
    const el = document.getElementById(id);
    return el ? String(el.value || '').trim() : '';
}

function nativeCheckedValue(id) {
    const el = document.getElementById(id);
    return !!(el && el.checked);
}

function setNativeStatus(id, data, okText) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'status-msg ' + (data && data.ok ? 'ok' : 'err');
    el.textContent = data && data.ok ? okText : ((data && data.error) || 'Failed');
}

async function postNativeJson(url, body) {
    const request = { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) };
    const res = url.startsWith('/api/native-models/openclaw/auth/')
        ? await i18n.managementFetch(url, request)
        : await fetch(url, request);
    return await res.json();
}

function hermesNativePayload() {
    const payload = {
        enabled: nativeCheckedValue('native-hermes-enabled'),
        homePath: nativeValue('native-hermes-home') || null,
        binary: nativeValue('native-hermes-bin') || null,
        apiEnabled: nativeCheckedValue('native-hermes-api-enabled'),
        preferApi: nativeCheckedValue('native-hermes-api-enabled'),
        apiUrl: nativeValue('native-hermes-api-url') || null,
        desktopUrl: nativeValue('native-hermes-desktop-url') || null,
        desktopTcpHost: nativeValue('native-hermes-desktop-host') || null,
        desktopTcpPort: nativeValue('native-hermes-desktop-port') || null,
        desktopHostHeader: nativeValue('native-hermes-desktop-header') || null,
        preferDesktop: !!nativeValue('native-hermes-desktop-url'),
        platformEnabled: nativeCheckedValue('native-hermes-platform-enabled'),
        platformAgentId: nativeValue('native-hermes-platform-agent') || 'hermes-gateway'
    };
    const apiKey = nativeValue('native-hermes-api-key');

function renderCloudProviders() {
    const container = document.getElementById('cloud-providers');
    const knownProviders = ['anthropic', 'anthropic-token', 'openai', 'openai-codex-oauth', 'google', 'groq'];
    const provDisplayNames = {
        'anthropic': 'ANTHROPIC 🔑 API',
        'anthropic-token': 'ANTHROPIC 🎫 OAuth',

        'openai-codex-oauth': 'OPENAI-CODEX 🎫 OAuth',
        'google': 'GOOGLE',
        'groq': 'GROQ',
    };
}

    let html = '';
    // Show known providers + any extras from auth profiles
    const allProviders = new Set([...knownProviders, ...Object.keys(ap)]);
    for (const prov of allProviders) {
        const info = ap[prov] || {};
        const hasKey = info.hasKey || false;
        const masked = info.maskedKey || '';
        const models = info.models || [];
        const isOAuth = !!info.isOAuth || prov.endsWith('-token') || prov.endsWith('-oauth');
        const authType = info.authType || (isOAuth ? 'subscription' : 'api_key');
        const authLabel = isOAuth ? i18n.t('subscription') : i18n.t('api_key');
        const placeholder = isOAuth ? i18n.t('token_placeholder') : i18n.t('api_key_placeholder');

        html += `<div class="card" id="prov-${prov}">
            <div class="provider-header">
                <span class="provider-name">${prov.toUpperCase()}</span>
                <span class="key-status ${hasKey ? 'has-key' : 'no-key'}">${hasKey ? authLabel + masked : i18n.t('no_credential')}</span>
            </div>
            <div class="row">
                <input id="key-${prov}" type="password" placeholder="${placeholder}" value="" autocomplete="off" ${isOAuth ? 'disabled' : ''}>
                ${isOAuth ? '' : `<button class="btn btn-green" onclick="saveKey('${prov}')">${i18n.t('save')}</button>`}
                ${hasKey ? `<button class="btn btn-red" onclick="deleteKey('${prov}', '${info.profileId || ''}')">${i18n.t('proj_delete')}</button>` : ''}
            </div>
            <p id="key-status-${prov}" class="status-msg"></p>`;

        // Collect configured models for this provider
        const configuredModels = providersData.configuredModels || {};
        // For anthropic-token, look for anthropic/ models
        const baseProv = prov.replace(/-token$|(-oauth)$/, '');
        const provConfigured = Object.keys(configuredModels).filter(mid => mid.startsWith(baseProv + '/'));

        // Check if this is a subscription provider
        const isSubscriptionProvider = prov.endsWith('-token') || prov.endsWith('-oauth');

        // For API providers, use live-fetched models; for subscription, use configured models
        let modelsToShow = [];
        if (!isSubscriptionProvider) {
            // API provider: show live-fetched models
            modelsToShow = models.map(m => {
                const id = typeof m === 'string' ? m : m.id || m;
                return id.includes('/') ? id : prov + '/' + id;
            });
        } else {
            // Subscription provider: show only configured models
            modelsToShow = provConfigured;
        }

        if (modelsToShow.length > 0 || (isSubscriptionProvider && provConfigured.length === 0)) {
            html += '<div class="model-list scrollable" style="max-height:300px">';

            if (!isSubscriptionProvider) {
                html += `<div style="padding:5px 6px;color:var(--green);font-size:7px;border-bottom:1px solid var(--border);background:rgba(76,175,80,0.08)">${i18n.t('api_key')} (${modelsToShow.length})</div>`;
                html += modelsToShow.map(m => `<div class="model-item"><span>${m}</span><span style="color:var(--green);font-size:6px">API</span></div>`).join('');
            } else {
                html += `<div style="padding:5px 6px;color:var(--gold);font-size:7px;border-bottom:1px solid var(--border);background:rgba(255,215,0,0.08)">${i18n.t('subscription')} (${modelsToShow.length})</div>`;
                html += modelsToShow.map(m => `<div class="model-item"><span>${m}</span><span style="color:var(--gold);font-size:6px">SUB</span></div>`).join('');
            }

            html += '</div>';
        } else if (hasKey) {
            html += `<p class="status-msg" style="color:var(--text-dim)">${i18n.t('no_models')}</p>`;
        }
        html += '</div>';
    }
    await postJson('/setup/save', { codex: codexSetupPayload() });
    const data = await postJson('/api/codex/test', codexSetupPayload());
    const text = data.ok
        ? 'Codex connected · ' + (data.protocol || 'codex') + ' · ' + ((data.agents || []).length) + ' agent' + (((data.agents || []).length) === 1 ? '' : 's')
        : (data.error || 'Codex test failed');
    if (status) {
        status.className = 'status-msg ' + (data.ok ? 'ok' : 'err');
        status.textContent = text;
    }
    if (data.ok) setTimeout(reloadNative, 800);
}

function normalizeOllamaBaseUrl(url) {
    return (url || '').trim().replace(/\/v1\/?$/, '');
}

async function saveKey(provider) {
    const baseProvider = normalizeProvider(provider);
    const input = document.getElementById('key-' + provider);
    const status = document.getElementById('key-status-' + provider);
    const key = input.value.trim();
    if (!key) { status.className = 'status-msg err'; status.textContent = i18n.t('enter_api_key'); return; }
    status.textContent = i18n.t('saving');
    try {
        const res = await fetch('/config/providers/save-key', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ provider: baseProvider, key })
        });
        const data = await res.json();
        if (data.ok) {
            status.className = 'status-msg ok'; status.textContent = i18n.t('key_saved');
            input.value = '';
            setTimeout(() => { providersData = null; loadProviders(); }, 1000);
        } else {
            status.className = 'status-msg err'; status.textContent = i18n.t('failed') + (data.error || i18n.t('error'));
        }
    } catch(e) {
        status.className = 'status-msg err'; status.textContent = i18n.t('failed') + e.message;
    }
}

async function deleteKey(provider, profileId='') {
    const baseProvider = normalizeProvider(provider);
    if (!confirm(i18n.t('confirm_delete_key').replace('{provider}', profileId || baseProvider))) return;
    const status = document.getElementById('key-status-' + provider);
    status.textContent = i18n.t('deleting');
    try {
        const res = await fetch('/config/providers/delete-key', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ provider: baseProvider, profileId })
        });
        const data = await res.json();
        if (data.ok) {
            status.className = 'status-msg ok'; status.textContent = i18n.t('key_deleted');
            setTimeout(() => { providersData = null; loadProviders(); }, 1000);
        } else {
            status.className = 'status-msg err'; status.textContent = i18n.t('failed') + (data.error || i18n.t('error'));
        }
    } catch(e) {
        status.className = 'status-msg err'; status.textContent = i18n.t('failed') + e.message;
    }
}

async function saveOllamaModel(modelId) {
    const safeId = modelId.replace(/[^a-zA-Z0-9]/g, '_');
    const status = document.getElementById('ollama-status-' + safeId);
    // Gather current ollama config and update this model
    const ollama = providersData.customProviders.ollama;
    const models = (ollama.models || []).map(m => {
        if (m.id === modelId) {
            const container = document.getElementById('params-' + safeId);
            const ctxInput = container.querySelector('[data-field="contextWindow"]');
            const maxInput = container.querySelector('[data-field="maxTokens"]');
            return {
                ...m,
                contextWindow: ctxInput ? parseInt(ctxInput.value) || m.contextWindow : m.contextWindow,
                maxTokens: maxInput ? parseInt(maxInput.value) || m.maxTokens : m.maxTokens
            };
        }
        return m;
    });
    status.textContent = i18n.t('saving');
    try {
        const res = await fetch('/config/providers/save-custom', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ provider: 'ollama', baseUrl: normalizeOllamaBaseUrl(ollama.baseUrl), api: 'ollama', apiKey: 'ollama-tailscale-local', timeoutSeconds: ollama.timeoutSeconds || 300, models })
        });
        const data = await res.json();
        if (data.ok) {
            status.className = 'status-msg ok'; status.textContent = i18n.t('saved');
            setTimeout(() => { providersData = null; loadProviders(); }, 1000);
        } else {
            status.className = 'status-msg err'; status.textContent = i18n.t('failed') + (data.error || i18n.t('error'));
        }
    } catch(e) {
        status.className = 'status-msg err'; status.textContent = i18n.t('failed') + e.message;
    }
}

// --- LM Studio ---
function renderLMStudio() {
    const container = document.getElementById('lmstudio-section');
    const cp = providersData.customProviders || {};
    const lms = cp.lmstudio;
    const params = providersData.modelParams || {};

    if (!lms) {
        container.innerHTML = '<div class="card"><p>' + i18n.t('lmstudio_not_configured') + '</p>' +
            '<p style="margin-top:8px;color:var(--text-dim)">' + i18n.t('lmstudio_add_hint') + '</p></div>';
        return;
    }

    let html = `<div class="card">
        <div class="provider-header">
            <span class="provider-name">🖥️ LM STUDIO</span>
            <span style="font-size:6px;color:var(--text-dim)">${lms.baseUrl} · api: ${lms.api || 'openai-completions'} · key: ${lms.apiKeyConfigured ? 'set' : 'missing'} · timeout: ${lms.timeoutSeconds || 300}s</span>
        </div>
    </div>`;

    // Models
    html += '<h2>' + i18n.t('models') + '</h2>';
    for (const m of (lms.models || [])) {
        const fullId = 'lmstudio/' + m.id;
        const mp = params[fullId] || {};
        const safeId = m.id.replace(/[^a-zA-Z0-9]/g, '_');
        html += `<div class="card">
            <div class="provider-header">
                <span class="provider-name">${m.name || m.id}</span>
                <span style="font-size:6px;color:var(--text-dim)">ctx: ${m.contextWindow ? (m.contextWindow/1000)+'k' : '?'} | max: ${m.maxTokens || '?'}</span>
            </div>
            <div class="ollama-params" id="lms-params-${safeId}">
                <label>${i18n.t('temperature')}</label><input type="number" step="0.1" min="0" max="2" value="${mp.temperature ?? ''}" data-param="temperature" data-model="${fullId}">
                <label>${i18n.t('top_p')}</label><input type="number" step="0.1" min="0" max="1" value="${mp.top_p ?? ''}" data-param="top_p" data-model="${fullId}">
                <label>${i18n.t('top_k')}</label><input type="number" step="1" min="0" value="${mp.top_k ?? ''}" data-param="top_k" data-model="${fullId}">
                <label>${i18n.t('repeat_penalty')}</label><input type="number" step="0.1" min="0" value="${mp.repeat_penalty ?? ''}" data-param="repeat_penalty" data-model="${fullId}">
                <label>${i18n.t('num_predict')}</label><input type="number" step="1" value="${mp.num_predict ?? ''}" data-param="num_predict" data-model="${fullId}">
                <label>${i18n.t('context_window')}</label><input type="number" step="1000" value="${m.contextWindow || ''}" data-field="contextWindow" data-model-id="${m.id}">
                <label>${i18n.t('max_tokens')}</label><input type="number" step="1000" value="${m.maxTokens || ''}" data-field="maxTokens" data-model-id="${m.id}">
            </div>
            <button class="btn btn-gold" onclick="saveLMStudioModel('${m.id.replace(/'/g,"\\'")}')">${i18n.t('save_parameters')}</button>
            <button class="btn btn-red" onclick="removeLMStudioModel('${m.id.replace(/'/g,"\\'")}')">${i18n.t('remove_model')}</button>
            <p id="lms-status-${safeId}" class="status-msg"></p>
        </div>`;
    }

    // Add model form
    html += `<div class="card" style="border-color:var(--gold)">
        <h3>➕ Add LM Studio Model</h3>
        <div class="row"><label>${i18n.t('model_id')}</label><input id="new-lms-id" placeholder="model-name"></div>
        <div class="row"><label>${i18n.t('display_name')}</label><input id="new-lms-name" placeholder="Friendly name"></div>
        <div class="row"><label>${i18n.t('context_window')}:</label><input id="new-lms-ctx" type="number" value="128000"></div>
        <div class="row"><label>${i18n.t('max_tokens')}:</label><input id="new-lms-max" type="number" value="20000"></div>
        <button class="btn btn-gold" onclick="addLMStudioModel()">${i18n.t('add_model_btn')}</button>
        <p id="new-lms-status" class="status-msg"></p>
    </div>`;

    container.innerHTML = html;
}

async function deleteOpenClawProviderById(provider, statusId = 'oc-delete-status') {
    if (!provider || !confirm('Delete OpenClaw provider ' + provider + '?')) return;
    const data = await postJson('/api/native-models/openclaw/provider/delete', { provider });
    setStatus(statusId, data, 'Deleted ' + provider);
    if (data.ok) setTimeout(reloadNative, 800);
}

async function setOpenClawAgentModel(agentId) {
    const data = await postJson('/api/native-models/openclaw/agent-model', { agent:agentId, model:val('oc-agent-' + agentId) });
    setStatus('oc-agent-status-' + agentId, data, 'Applied');
    if (data.ok) setTimeout(reloadNative, 800);
}

async function saveHermesApiKey() {
    const data = await postJson('/api/native-models/hermes/auth/api-key', { provider:val('hm-key-provider'), label:val('hm-key-label'), apiKey:val('hm-key-value') });

async function saveHermesProvider() {
    const data = await postJson('/api/native-models/hermes/provider', { profile:val('hm-provider-profile'), provider:val('hm-provider-id'), baseUrl:val('hm-provider-url'), models:val('hm-provider-models') });
    setStatus('hm-provider-status', data, 'Saved ' + (data.provider || 'provider'));

}

async function saveHermesLocalProvider(index) {
    const body = {
        profile: val('hm-local-provider-profile-' + index) || 'default',
        provider: val('hm-local-provider-id-' + index),
        baseUrl: val('hm-local-provider-url-' + index),
        models: val('hm-local-provider-models-' + index)
    };
    const data = await postJson('/api/native-models/hermes/provider', body);
    setStatus('hm-local-provider-status-' + index, data, 'Saved ' + (data.provider || body.provider));
    if (data.ok) setTimeout(reloadNative, 800);
}

async function deleteHermesProvider() {
    const provider = val('hm-delete-provider');
    return deleteHermesProviderByValues(val('hm-delete-profile'), provider, 'hm-delete-status');
}

async function deleteHermesLocalProvider(index) {
    return deleteHermesProviderByValues(
        val('hm-local-provider-profile-' + index),
        val('hm-local-provider-id-' + index),
        'hm-local-provider-status-' + index
    );
}

async function deleteHermesProviderByValues(profile, provider, statusId = 'hm-delete-status') {
    if (!provider || !confirm('Delete Hermes custom aliases/cache for ' + provider + '?')) return;
    const data = await postJson('/api/native-models/hermes/provider/delete', { profile: profile || 'default', provider });
    setStatus(statusId, data, 'Deleted ' + provider);
    if (data.ok) setTimeout(reloadNative, 800);
}

async function deleteHermesAuth() {
    const data = await postJson('/api/native-models/hermes/auth/delete', { provider:val('hm-delete-provider'), target:val('hm-delete-auth-target') });
    setStatus('hm-delete-status', data, 'Deleted auth');
    if (data.ok) setTimeout(reloadNative, 800);
}

async function setHermesProfileModel(profileId) {
    const modelValue = val('hm-model-' + profileId);
    const model = modelValue.includes('/') ? modelValue.split('/').slice(1).join('/') : modelValue;
    const data = await postJson('/api/native-models/hermes/profile-model', { profile:profileId, provider:val('hm-prov-' + profileId), model });
    setStatus('hm-status-' + profileId, data, 'Applied');
    if (data.ok) setTimeout(reloadNative, 800);
}
