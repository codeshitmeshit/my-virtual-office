<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="350" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">部署架构</text>
  
  <!-- Docker Compose box -->
  <rect x="40" y="60" width="620" height="400" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="350" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">docker-compose.yml</text>
  
  <!-- Main app container -->
  <rect x="70" y="110" width="260" height="200" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="200" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">主应用容器</text>
  <text x="200" y="162" text-anchor="middle" font-size="11" fill="#64748b">python:3.12-slim</text>
  <text x="200" y="182" text-anchor="middle" font-size="11" fill="#64748b">+ websockets</text>
  <text x="200" y="202" text-anchor="middle" font-size="11" fill="#64748b">host networking</text>
  <text x="200" y="222" text-anchor="middle" font-size="11" fill="#64748b">pid: host</text>
  <text x="200" y="248" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">server.py (10K+ 行)</text>
  <text x="200" y="268" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">game.js (15K+ 行)</text>
  <text x="200" y="288" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">chat.js (2.9K+ 行)</text>
  
  <!-- Volume -->
  <rect x="70" y="340" width="260" height="50" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text x="200" y="365" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">vo-data:/data</text>
  <text x="200" y="382" text-anchor="middle" font-size="10" fill="#64748b">JSON 状态文件持久化</text>
  
  <line x1="200" y1="310" x2="200" y2="340" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Marketing site container -->
  <rect x="380" y="110" width="260" height="120" rx="14" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
  <text x="510" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">营销站容器</text>
  <text x="510" y="162" text-anchor="middle" font-size="11" fill="#64748b">nginx:alpine</text>
  <text x="510" y="182" text-anchor="middle" font-size="11" fill="#64748b">独立容器，与主应用无直接通信</text>
  <text x="510" y="210" text-anchor="middle" font-size="11" fill="#334155" font-weight="600">website/index.html</text>
  
  <!-- Optional browser -->
  <rect x="380" y="260" width="260" height="100" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="510" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b">Agent Browser（可选）</text>
  <text x="510" y="312" text-anchor="middle" font-size="11" fill="#64748b">kasmweb/chromium:1.17.0</text>
  <text x="510" y="332" text-anchor="middle" font-size="11" fill="#64748b">KasmVNC + Chromium CDP</text>
  <text x="510" y="352" text-anchor="middle" font-size="10" fill="#94a3b8">Premium 功能</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>