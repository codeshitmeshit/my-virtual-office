<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">数据流关键路径</text>
  
  <defs>
    <marker id="af" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Hub -->
  <rect x="300" y="160" width="200" height="80" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">server.py</text>
  <text x="400" y="210" text-anchor="middle" font-size="11" fill="#64748b">核心枢纽</text>
  <text x="400" y="228" text-anchor="middle" font-size="10" fill="#64748b">~10,483 行</text>
  
  <!-- Flow 1: Agent Status -->
  <rect x="30" y="60" width="160" height="50" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text x="110" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">Agent 状态流</text>
  <text x="110" y="100" text-anchor="middle" font-size="9" fill="#64748b">Gateway WS → presence → 前端</text>
  <line x1="190" y1="85" x2="300" y2="180" stroke="#15803d" stroke-width="1.5" marker-end="url(#af)"/>
  
  <!-- Flow 2: Agent Chat -->
  <rect x="30" y="140" width="160" height="50" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text x="110" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">Agent 聊天流</text>
  <text x="110" y="180" text-anchor="middle" font-size="9" fill="#64748b">前端 → Gateway WS → Agent</text>
  <line x1="190" y1="165" x2="300" y2="195" stroke="#15803d" stroke-width="1.5" marker-end="url(#af)"/>
  
  <!-- Flow 3: Hermes Chat -->
  <rect x="30" y="220" width="160" height="50" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="110" y="242" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">Hermes 聊天流</text>
  <text x="110" y="260" text-anchor="middle" font-size="9" fill="#64748b">前端 → HTTP 轮询 → CLI</text>
  <line x1="190" y1="245" x2="300" y2="210" stroke="#b45309" stroke-width="1.5" marker-end="url(#af)"/>
  
  <!-- Flow 4: Office Config -->
  <rect x="610" y="60" width="160" height="50" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="690" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">办公室配置流</text>
  <text x="690" y="100" text-anchor="middle" font-size="9" fill="#64748b">前端 → POST → JSON 文件</text>
  <line x1="500" y1="180" x2="610" y2="85" stroke="#2563eb" stroke-width="1.5" marker-end="url(#af)"/>
  
  <!-- Flow 5: Projects -->
  <rect x="610" y="140" width="160" height="50" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="690" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">项目数据流</text>
  <text x="690" y="180" text-anchor="middle" font-size="9" fill="#64748b">Markdown 文件 → REST API</text>
  <line x1="500" y1="200" x2="610" y2="165" stroke="#2563eb" stroke-width="1.5" marker-end="url(#af)"/>
  
  <!-- Flow 6: Browser -->
  <rect x="30" y="300" width="160" height="50" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="110" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Agent Browser</text>
  <text x="110" y="340" text-anchor="middle" font-size="9" fill="#64748b">CDP + VNC iframe</text>
  <line x1="190" y1="325" x2="300" y2="225" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#af)"/>
  
  <!-- External services -->
  <rect x="610" y="220" width="160" height="50" rx="10" fill="#fff1f2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="690" y="242" text-anchor="middle" font-size="11" font-weight="600" fill="#b91c1c">外部 HTTPS API</text>
  <text x="690" y="260" text-anchor="middle" font-size="9" fill="#64748b">Lemon Squeezy / Twilio</text>
  <line x1="500" y1="220" x2="610" y2="245" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#af)"/>
  
  <!-- Legend -->
  <rect x="250" y="300" width="300" height="80" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="322" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2937">图例</text>
  <text x="270" y="345" font-size="10" fill="#15803d">● Agent 相关（绿色）</text>
  <text x="420" y="345" font-size="10" fill="#2563eb">● 配置与数据（蓝色）</text>
  <text x="270" y="365" font-size="10" fill="#b45309">● Hermes 相关（琥珀色）</text>
  <text x="420" y="365" font-size="10" fill="#b91c1c">● 外部服务（红色）</text>
</svg>