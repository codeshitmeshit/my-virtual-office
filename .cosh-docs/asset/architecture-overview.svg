<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">系统架构总览</text>
  
  <!-- Browser -->
  <rect x="280" y="60" width="240" height="70" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">浏览器</text>
  <text x="400" y="112" text-anchor="middle" font-size="11" fill="#64748b">game.js + chat.js + 各面板</text>
  
  <!-- HTTP/WS arrows down -->
  <line x1="360" y1="130" x2="360" y2="175" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="130" x2="440" y2="175" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="340" y="158" font-size="10" fill="#64748b">HTTP</text>
  <text x="450" y="158" font-size="10" fill="#64748b">WebSocket</text>
  
  <!-- Server -->
  <rect x="180" y="180" width="440" height="100" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">app/server.py（Python 单体 HTTP 服务器）</text>
  <text x="400" y="232" text-anchor="middle" font-size="11" fill="#64748b">静态文件 | REST API | WS 代理 | 配置管理 | 许可证</text>
  <text x="400" y="252" text-anchor="middle" font-size="11" fill="#64748b">依赖: discovery.py, gateway_presence.py, license.py, project_store.py</text>
  <text x="400" y="272" text-anchor="middle" font-size="11" fill="#64748b">~10,483 行</text>
  
  <!-- External services -->
  <rect x="40" y="330" width="140" height="60" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text x="110" y="355" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">OpenClaw Gateway</text>
  <text x="110" y="375" text-anchor="middle" font-size="10" fill="#64748b">ws://18789</text>
  
  <rect x="210" y="330" width="120" height="60" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text x="270" y="355" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Hermes CLI</text>
  <text x="270" y="375" text-anchor="middle" font-size="10" fill="#64748b">子进程</text>
  
  <rect x="360" y="330" width="120" height="60" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="420" y="355" text-anchor="middle" font-size="12" font-weight="600" fill="#b45309">Lemon Squeezy</text>
  <text x="420" y="375" text-anchor="middle" font-size="10" fill="#64748b">HTTPS API</text>
  
  <rect x="510" y="330" width="120" height="60" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="570" y="355" text-anchor="middle" font-size="12" font-weight="600" fill="#b45309">Twilio / 天气</text>
  <text x="570" y="375" text-anchor="middle" font-size="10" fill="#64748b">HTTPS</text>
  
  <!-- Arrows from server to external -->
  <line x1="280" y1="280" x2="110" y2="330" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="280" x2="270" y2="330" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="280" x2="420" y2="330" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="280" x2="570" y2="330" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Data layer -->
  <rect x="230" y="440" width="340" height="60" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="465" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Docker Volume /data</text>
  <text x="400" y="485" text-anchor="middle" font-size="10" fill="#64748b">vo-config.json, virtual-office-status.json, office-config.json, projects-md/</text>
  
  <line x1="400" y1="280" x2="400" y2="440" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="410" y="370" font-size="10" fill="#64748b">JSON 文件读写</text>
</svg>