<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="350" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">代理发现：双 Provider 流程</text>
  
  <defs>
    <marker id="cf" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Start -->
  <rect x="250" y="60" width="200" height="40" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="350" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">_refresh_discovery()</text>
  
  <line x1="350" y1="100" x2="350" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#cf)"/>
  
  <!-- discover_all_agents -->
  <rect x="220" y="135" width="260" height="40" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="161" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">discover_all_agents()</text>
  
  <!-- Split -->
  <line x1="300" y1="175" x2="160" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#cf)"/>
  <line x1="400" y1="175" x2="540" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#cf)"/>
  
  <!-- OpenClaw path -->
  <rect x="40" y="215" width="240" height="100" rx="12" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text x="160" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">OpenClaw Provider</text>
  <text x="160" y="262" text-anchor="middle" font-size="10" fill="#64748b">1. 读取 openclaw.json → agents.list</text>
  <text x="160" y="280" text-anchor="middle" font-size="10" fill="#64748b">2. 备选: 扫描 agents/ 目录</text>
  <text x="160" y="298" text-anchor="middle" font-size="10" fill="#64748b">3. 解析 IDENTITY.md → name/emoji/role</text>
  
  <!-- Hermes path -->
  <rect x="420" y="215" width="240" height="100" rx="12" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="540" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">Hermes Provider</text>
  <text x="540" y="262" text-anchor="middle" font-size="10" fill="#64748b">1. HermesProvider 初始化</text>
  <text x="540" y="280" text-anchor="middle" font-size="10" fill="#64748b">2. 执行 hermes profile list CLI</text>
  <text x="540" y="298" text-anchor="middle" font-size="10" fill="#64748b">3. 解析输出，构建代理列表</text>
  
  <!-- Converge -->
  <line x1="160" y1="315" x2="350" y2="350" stroke="#64748b" stroke-width="1.5" marker-end="url(#cf)"/>
  <line x1="540" y1="315" x2="350" y2="350" stroke="#64748b" stroke-width="1.5" marker-end="url(#cf)"/>
  
  <!-- Unified roster -->
  <rect x="220" y="355" width="260" height="40" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="350" y="381" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">统一代理花名册 (roster)</text>
</svg>