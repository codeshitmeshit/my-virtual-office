<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">My Virtual Office 前端组件位置图</title>
  <desc id="desc">展示主画布、底部工具栏、右侧仪表盘、画布内抽屉、浮动窗口和模态层之间的位置关系。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity=".16"/>
    </filter>
    <style>
      .label { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif; fill:#0f172a; }
      .title { font-size:28px; font-weight:800; }
      .h { font-size:20px; font-weight:800; }
      .p { font-size:15px; fill:#475569; }
      .code { font-family:Consolas,monospace; font-size:14px; fill:#334155; }
      .num { font-size:18px; font-weight:900; fill:#fff; }
    </style>
  </defs>
  <rect width="1440" height="900" fill="#f8fafc"/>
  <text x="70" y="62" class="label title">My Virtual Office 前端屏幕分区</text>
  <text x="70" y="92" class="label p">先判断组件属于常驻布局、Canvas 绘制、画布内抽屉、全局浮窗还是模态层，再决定修改位置。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="130" width="1300" height="690" rx="18" fill="#0f172a"/>
    <rect x="88" y="148" width="954" height="594" rx="10" fill="#dbeafe"/>
    <rect x="88" y="742" width="954" height="60" rx="0" fill="#1e293b"/>
    <rect x="1042" y="148" width="24" height="654" fill="#334155"/>
    <rect x="1066" y="148" width="286" height="654" rx="10" fill="#172033"/>
  </g>

  <text x="460" y="430" class="label h">办公室 Canvas 主场景</text>
  <text x="405" y="458" class="label code">#officeCanvas · game.js 绘制</text>
  <text x="395" y="486" class="label p">房间、家具、Agent、气泡、天气、选区均不是 DOM 组件</text>

  <rect x="105" y="170" width="190" height="505" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="126" y="205" class="label h">画布内左侧抽屉</text>
  <text x="126" y="236" class="label code">main-menu-panel</text>
  <text x="126" y="264" class="label code">furniture-catalog</text>
  <text x="126" y="292" class="label code">agent-creator-panel</text>
  <text x="126" y="326" class="label p">同一时刻按功能滑入，</text>
  <text x="126" y="350" class="label p">父级是 .game-wrapper。</text>

  <text x="116" y="778" class="label h" fill="#fff">底部工具栏 .toolbar</text>
  <text x="415" y="778" class="label p" fill="#cbd5e1">Menu / Edit / Agents / Projects / SMS / Browser</text>

  <text x="1078" y="184" class="label h" fill="#fff">右侧 Dashboard</text>
  <text x="1078" y="218" class="label code" fill="#cbd5e1">.sidebar · 360px</text>
  <g class="label p" fill="#cbd5e1">
    <text x="1090" y="264">PC Performance</text>
    <text x="1090" y="302">API Usage</text>
    <text x="1090" y="340">Branches</text>
    <text x="1090" y="378">Leaderboard</text>
    <text x="1090" y="416">Meetings</text>
    <text x="1090" y="454">Projects</text>
    <text x="1090" y="492">Skills Library</text>
    <text x="1090" y="530">Status</text>
    <text x="1090" y="568">Activity Log</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="205" width="430" height="300" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="4"/>
    <rect x="550" y="238" width="370" height="44" rx="6" fill="#047857"/>
  </g>
  <text x="574" y="267" class="label h" fill="#fff">全局浮动窗口层</text>
  <text x="575" y="325" class="label code">chat-panel / secondary chats</text>
  <text x="575" y="360" class="label code">sms-panel</text>
  <text x="575" y="395" class="label code">browser-panel</text>
  <text x="575" y="430" class="label code">agent-workspace-panel</text>
  <text x="575" y="465" class="label p">fixed 定位，可拖动、缩放、吸附或最大化</text>

  <g filter="url(#shadow)">
    <rect x="345" y="535" width="500" height="155" rx="12" fill="#fff1f2" stroke="#e11d48" stroke-width="4"/>
  </g>
  <text x="375" y="576" class="label h">全屏模态层 .modal</text>
  <text x="375" y="612" class="label code">agentModal · meetingsModal · skillsLibraryModal</text>
  <text x="375" y="644" class="label code">projectsModal · endMeetingModal · skillEditorModal</text>
  <text x="375" y="674" class="label p">覆盖主布局；Projects 内还有右侧 task detail slide-in。</text>

  <g>
    <circle cx="92" cy="148" r="19" fill="#2563eb"/><text x="86" y="155" class="label num">1</text>
    <circle cx="88" cy="742" r="19" fill="#2563eb"/><text x="82" y="749" class="label num">2</text>
    <circle cx="1066" cy="148" r="19" fill="#2563eb"/><text x="1060" y="155" class="label num">3</text>
    <circle cx="950" cy="205" r="19" fill="#059669"/><text x="944" y="212" class="label num">4</text>
    <circle cx="845" cy="535" r="19" fill="#e11d48"/><text x="839" y="542" class="label num">5</text>
  </g>
</svg>
