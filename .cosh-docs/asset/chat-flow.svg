<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="350" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">聊天消息流：OpenClaw vs Hermes</text>
  
  <defs>
    <marker id="ef" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- User -->
  <rect x="280" y="60" width="140" height="40" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="350" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">用户输入</text>
  
  <!-- Split -->
  <line x1="310" y1="100" x2="160" y2="140" stroke="#15803d" stroke-width="1.5" marker-end="url(#ef)"/>
  <line x1="390" y1="100" x2="540" y2="140" stroke="#b45309" stroke-width="1.5" marker-end="url(#ef)"/>
  
  <text x="210" y="125" font-size="10" fill="#15803d" font-weight="600">OpenClaw</text>
  <text x="470" y="125" font-size="10" fill="#b45309" font-weight="600">Hermes</text>
  
  <!-- OpenClaw path -->
  <rect x="40" y="145" width="240" height="160" rx="12" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text x="160" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">OpenClaw 路径 (WebSocket)</text>
  <text x="160" y="195" text-anchor="middle" font-size="10" fill="#64748b">1. rpc('sessions.send', {sessionKey, text})</text>
  <text x="160" y="215" text-anchor="middle" font-size="10" fill="#64748b">2. Gateway WS 转发到 Agent</text>
  <text x="160" y="235" text-anchor="middle" font-size="10" fill="#64748b">3. 监听 WS 事件流:</text>
  <text x="160" y="253" text-anchor="middle" font-size="10" fill="#64748b">  'stream' → 流式内容 (80ms)</text>
  <text x="160" y="271" text-anchor="middle" font-size="10" fill="#64748b">  'tool_start/result' → 工具卡片</text>
  <text x="160" y="289" text-anchor="middle" font-size="10" fill="#64748b">  'final' → 最终响应</text>
  
  <!-- Hermes path -->
  <rect x="420" y="145" width="240" height="160" rx="12" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="540" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">Hermes 路径 (HTTP 轮询)</text>
  <text x="540" y="195" text-anchor="middle" font-size="10" fill="#64748b">1. POST /api/hermes/chat</text>
  <text x="540" y="215" text-anchor="middle" font-size="10" fill="#64748b">2. server.py → hermes -z 子进程</text>
  <text x="540" y="235" text-anchor="middle" font-size="10" fill="#64748b">3. 轮询 GET /api/hermes/approval/pending</text>
  <text x="540" y="253" text-anchor="middle" font-size="10" fill="#64748b">  (1.5s 间隔)</text>
  <text x="540" y="271" text-anchor="middle" font-size="10" fill="#64748b">4. GET /api/hermes/history</text>
  <text x="540" y="289" text-anchor="middle" font-size="10" fill="#64748b">5. 渲染到 appendMessage()</text>
  
  <!-- Converge -->
  <line x1="160" y1="305" x2="350" y2="345" stroke="#64748b" stroke-width="1.5" marker-end="url(#ef)"/>
  <line x1="540" y1="305" x2="350" y2="345" stroke="#64748b" stroke-width="1.5" marker-end="url(#ef)"/>
  
  <!-- Final render -->
  <rect x="250" y="350" width="200" height="40" rx="10" fill="#0f172a"/>
  <text x="350" y="376" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">appendMessage() 渲染到 DOM</text>
</svg>