<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="350" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">服务器启动：三线程架构</text>
  
  <defs>
    <marker id="bf" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Main entry -->
  <rect x="230" y="60" width="240" height="44" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="350" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">if __name__ == "__main__"</text>
  
  <!-- Three threads -->
  <rect x="40" y="140" width="180" height="80" rx="12" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text x="130" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">线程 1: API 用量收集</text>
  <text x="130" y="188" text-anchor="middle" font-size="10" fill="#64748b">后台轮询</text>
  <text x="130" y="206" text-anchor="middle" font-size="10" fill="#64748b">非核心功能</text>
  
  <rect x="260" y="140" width="180" height="80" rx="12" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <text x="350" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">线程 2: WS 代理 (daemon)</text>
  <text x="350" y="188" text-anchor="middle" font-size="10" fill="#64748b">监听端口 8091</text>
  <text x="350" y="206" text-anchor="middle" font-size="10" fill="#64748b">转发浏览器 WS → Gateway</text>
  
  <rect x="480" y="140" width="180" height="80" rx="12" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="570" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">线程 3: 工作流恢复 (daemon)</text>
  <text x="570" y="188" text-anchor="middle" font-size="10" fill="#64748b">sleep(3) 后扫描卡住任务</text>
  <text x="570" y="206" text-anchor="middle" font-size="10" fill="#64748b">_wf_run_pipeline 恢复</text>
  
  <!-- Arrows from entry to threads -->
  <line x1="310" y1="104" x2="130" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#bf)"/>
  <line x1="350" y1="104" x2="350" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#bf)"/>
  <line x1="390" y1="104" x2="570" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#bf)"/>
  
  <!-- Main thread -->
  <rect x="160" y="260" width="380" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="350" y="288" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">主线程: start_http_server()（阻塞）</text>
  <text x="350" y="310" text-anchor="middle" font-size="11" fill="#64748b">get_roster() → gateway_presence.init() → load_snapshot() → serve_forever()</text>
  
  <line x1="350" y1="104" x2="350" y2="260" stroke="#2563eb" stroke-width="2" marker-end="url(#bf)"/>
  <text x="365" y="190" font-size="10" fill="#2563eb" font-weight="600">主线程</text>
  
  <!-- Final -->
  <rect x="230" y="360" width="240" height="44" rx="10" fill="#0f172a"/>
  <text x="350" y="388" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">serve_forever() 阻塞等待请求</text>
  
  <line x1="350" y1="330" x2="350" y2="360" stroke="#64748b" stroke-width="1.5" marker-end="url(#bf)"/>
</svg>